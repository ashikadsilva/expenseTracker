*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.sr-only{position:absolute;width:1px;height:1px;clip:rect(0,0,0,0);overflow:hidden}
select{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--color-text-primary);cursor:pointer;font-family:inherit}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 1.25rem;margin-bottom:1.25rem}
.tab{padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap}

.upload-zone{border:1.5px dashed var(--color-border-secondary);border-radius:12px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;margin-bottom:1rem}

</style>

<h2 class="sr-only">Monthly budget reader showing all data from your Excel file</h2>

<div style="padding:1rem 1.25rem 0">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
    <div>
      <div style="font-size:17px;font-weight:500;color:var(--color-text-primary)">Monthly budget reader</div>
      <div style="font-size:12px;color:var(--color-text-secondary)" id="file-label">Showing data from Monthly_budget.xlsx</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <select id="sel-month" onchange="render()"></select>
      <select id="sel-acc" onchange="render()">

        <option value="Canara">Canara Bank</option>

        ↑ Upload new file
        <input type="file" accept=".xlsx,.xls" style="display:none" onchange="loadFile(event)"/>
      </label>
    </div>
  </div>
</div>

let data = RAW_DATA;
let activeTab = 'overview';

function fmt(n){
  if(n===null||n===undefined) return '—';
  return '₹'+Math.abs(Math.round(n)).toLocaleString('en-IN');
}
function fmtSigned(n){
  if(n===null||n===undefined) return '—';
  const sign = n>=0?'+':'-';
  return sign+'₹'+Math.abs(Math.round(n)).toLocaleString('en-IN');
}
function pct(n){ return (n*100).toFixed(1)+'%'; }

function getMonths(){
  const months = [...new Set(data.map(d=>d.month+' '+d.year))];
  const order = ['Aug 2025','Sep 2025','Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026'];
  return order.filter(m=>months.includes(m));
}

function populateMonthSelect(){
  const sel = document.getElementById('sel-month');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">All months</option>';
  getMonths().forEach(m=>{
    const o = document.createElement('option');
    o.value=m; o.textContent=m; sel.appendChild(o);
  });
  if(cur && [...sel.options].some(o=>o.value===cur)) sel.value=cur;
}

function getFiltered(){
  const m = document.getElementById('sel-month').value;
  const a = document.getElementById('sel-acc').value;
  return data.filter(d=>{
    if(m!=='all' && (d.month+' '+d.year)!==m) return false;
    if(a!=='all' && d.account!==a) return false;
    return true;
  });
}

function switchTab(name, el){
  activeTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  ['overview','categories','trend','sheets'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  render();
}

function render(){
  if(activeTab==='overview') renderOverview();
  else if(activeTab==='categories') renderCategories();
  else if(activeTab==='trend') renderTrend();
  else if(activeTab==='sheets') renderSheets();
}

function renderOverview(){
  const sheets = getFiltered();
  const totExp = sheets.reduce((s,d)=>s+d.total_expenses_actual,0);
  const totInc = sheets.reduce((s,d)=>s+d.total_income_actual,0);
  const netSaved = sheets.reduce((s,d)=>s+d.saved_this_month,0);
  const startBal = sheets.length ? sheets[0].start_balance : 0;
  const endBal = sheets.length ? sheets[sheets.length-1].end_balance : 0;
  const net = totInc - totExp;

  const el = document.getElementById('tab-overview');
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem">
      <div class="mcard"><div class="mlabel">Starting balance</div><div class="mval" style="color:#185FA5">${fmt(startBal)}</div></div>
      <div class="mcard"><div class="mlabel">Ending balance</div><div class="mval" style="color:${endBal>=startBal?'#3B6D11':'#A32D2D'}">${fmt(endBal)}</div></div>
      <div class="mcard"><div class="mlabel">Net change</div><div class="mval" style="color:${netSaved>=0?'#3B6D11':'#A32D2D'}">${fmtSigned(netSaved)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1.25rem">
      <div class="mcard"><div class="mlabel">Total spent</div><div class="mval" style="color:#A32D2D">${fmt(totExp)}</div></div>
      <div class="mcard"><div class="mlabel">Total income</div><div class="mval" style="color:#3B6D11">${fmt(totInc)}</div></div>
      <div class="mcard"><div class="mlabel">Income − expenses</div><div class="mval" style="color:${net>=0?'#3B6D11':'#A32D2D'}">${fmtSigned(net)}</div></div>
    </div>

    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Month-by-month summary</div>
    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden">
      <div class="thead" style="grid-template-columns:90px 80px 90px 90px 90px 80px 80px">
        <span>Month</span><span>Account</span><span style="text-align:right">Start bal.</span><span style="text-align:right">End bal.</span><span style="text-align:right">Spent</span><span style="text-align:right">Income</span><span style="text-align:right">Saved</span>
      </div>
      ${sheets.map(d=>`
        <div class="trow" style="grid-template-columns:90px 80px 90px 90px 90px 80px 80px">
          <span style="font-weight:500">${d.month} ${d.year}</span>
          <span><span class="badge" style="background:${d.account==='Canara'?'#E6F1FB':'#E1F5EE'};color:${d.account==='Canara'?'#0C447C':'#085041'}">${d.account}</span></span>
          <span style="text-align:right;font-size:12px">${fmt(d.start_balance)}</span>
          <span style="text-align:right;font-size:12px;color:${d.end_balance>=d.start_balance?'#3B6D11':'#A32D2D'}">${fmt(d.end_balance)}</span>
          <span style="text-align:right;font-size:12px;color:#A32D2D">${fmt(d.total_expenses_actual)}</span>
          <span style="text-align:right;font-size:12px;color:#3B6D11">${fmt(d.total_income_actual)}</span>
          <span style="text-align:right;font-size:12px;font-weight:500;color:${d.saved_this_month>=0?'#3B6D11':'#A32D2D'}">${fmtSigned(d.saved_this_month)}</span>
        </div>`).join('')}
    </div>`;
}

function renderCategories(){
  const sheets = getFiltered();
  const catMap={};
  sheets.forEach(d=>{
    d.expense_categories.forEach(c=>{
      if(c.actual>0) catMap[c.category]=(catMap[c.category]||0)+c.actual;
    });
  });
  const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const total = cats.reduce((s,c)=>s+c[1],0);

  const incMap={};
  sheets.forEach(d=>{
    d.income_categories.forEach(c=>{
      if(c.actual>0) incMap[c.category]=(incMap[c.category]||0)+c.actual;
    });
  });
  const incCats = Object.entries(incMap).sort((a,b)=>b[1]-a[1]);

  const el = document.getElementById('tab-categories');

    <div class="section-title" style="margin-top:0">Expenses by category</div>
    <div style="border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;margin-bottom:1.25rem">

      ${cats.map((c,i)=>{
        const p = total>0?(c[1]/total*100):0;
        const col = CAT_COLORS[i%CAT_COLORS.length];
        return `<div class="trow" style="grid-template-columns:130px 1fr 90px 60px">
          <span style="font-weight:500;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></span>${c[0]}</span>
          <div style="padding-right:12px"><div class="pbar"><div class="pinner" style="width:${p.toFixed(1)}%;background:${col}"></div></div></div>
          <span style="text-align:right;font-weight:500;color:#A32D2D">${fmt(c[1])}</span>
          <span style="text-align:right;color:var(--color-text-secondary)">${p.toFixed(1)}%</span>
        </div>`;
      }).join('')}
      <div class="trow" style="grid-template-columns:130px 1fr 90px 60px;font-weight:500;border-top:1px solid var(--color-border-secondary)">
        <span>Total</span><span></span><span style="text-align:right;color:#A32D2D">${fmt(total)}</span><span></span>
      </div>
    </div>

      ${incCats.map((c,i)=>{
        const p = incTotal>0?(c[1]/incTotal*100):0;
        const col = ['#3B6D11','#185FA5','#534AB7','#0F6E56','#BA7517'][i%5];
        return `<div class="trow" style="grid-template-columns:130px 1fr 90px 60px">

      </div>

}

function renderTrend(){
  const el = document.getElementById('tab-trend');
  const acc = document.getElementById('sel-acc').value;

  const months = getMonths();
  const expByMonth = months.map(mo=>{
    const [m,y]=mo.split(' ');
    return data.filter(d=>d.month===m&&d.year===y&&(acc==='all'||d.account===acc)).reduce((s,d)=>s+d.total_expenses_actual,0);
  });
  const incByMonth = months.map(mo=>{
    const [m,y]=mo.split(' ');
    return data.filter(d=>d.month===m&&d.year===y&&(acc==='all'||d.account===acc)).reduce((s,d)=>s+d.total_income_actual,0);
  });
  const balByMonth = months.map(mo=>{
    const [m,y]=mo.split(' ');
    const sheets = data.filter(d=>d.month===m&&d.year===y&&(acc==='all'||d.account===acc));
    return sheets.reduce((s,d)=>s+d.end_balance,0);
  });
  const savedByMonth = months.map(mo=>{
    const [m,y]=mo.split(' ');
    return data.filter(d=>d.month===m&&d.year===y&&(acc==='all'||d.account===acc)).reduce((s,d)=>s+d.saved_this_month,0);
  });

  el.innerHTML = `
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Income vs expenses</div>
    <div style="display:flex;gap:16px;margin-bottom:6px;font-size:12px;color:var(--color-text-secondary)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E24B4A"></span>Expenses</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#639922"></span>Income</span>
    </div>
    <div style="position:relative;height:220px;margin-bottom:1.25rem"><canvas id="trendChart" role="img" aria-label="Monthly income vs expenses bar chart">Monthly income and expense data for ${months.join(', ')}</canvas></div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">End-of-month balance</div>
    <div style="position:relative;height:180px;margin-bottom:1.25rem"><canvas id="balChart" role="img" aria-label="End of month balance trend">Balance data for ${months.join(', ')}</canvas></div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px">Monthly saved/lost</div>
    <div style="position:relative;height:160px"><canvas id="savedChart" role="img" aria-label="Monthly amount saved or lost">Monthly savings/loss data</canvas></div>`;

  setTimeout(()=>{
    if(chartInst1){chartInst1.destroy();}
    if(chartInst2){chartInst2.destroy();}
    const fmtK = v=>(v>=1000||v<=-1000)?(v/1000).toFixed(0)+'k':v;
    chartInst1 = new Chart(document.getElementById('trendChart'),{
      type:'bar',
      data:{labels:months,datasets:[
        {label:'Expenses',data:expByMonth.map(v=>Math.round(v)),backgroundColor:'rgba(226,75,74,0.7)'},
        {label:'Income',data:incByMonth.map(v=>Math.round(v)),backgroundColor:'rgba(99,153,34,0.7)'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmtK,font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:11},autoSkip:false,maxRotation:30},grid:{display:false}}}}
    });
    chartInst2 = new Chart(document.getElementById('balChart'),{
      type:'line',
      data:{labels:months,datasets:[{label:'Balance',data:balByMonth.map(v=>Math.round(v)),borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',tension:0.4,fill:true,pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmtK,font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:11},autoSkip:false,maxRotation:30},grid:{display:false}}}}
    });
    new Chart(document.getElementById('savedChart'),{
      type:'bar',
      data:{labels:months,datasets:[{label:'Saved',data:savedByMonth.map(v=>Math.round(v)),backgroundColor:savedByMonth.map(v=>v>=0?'rgba(99,153,34,0.7)':'rgba(226,75,74,0.7)')}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:fmtK,font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:11},autoSkip:false,maxRotation:30},grid:{display:false}}}}
    });
  },50);
}

function loadFile(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const wb = XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const parsed=[];
      const monthMap={jan:'Jan',feb:'Feb',mar:'Mar',apr:'Apr',may:'May',jun:'Jun',jul:'Jul',aug:'Aug',sep:'Sep',oct:'Oct',nov:'Nov',dec:'Dec'};
      wb.SheetNames.forEach(sn=>{
        if(!sn.toLowerCase().includes('summary')) return;
        const ws=wb.Sheets[sn];
        const df=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        const cell=(r,c)=>{try{const v=df[r]&&df[r][c];return(v===null||v===undefined||String(v).trim()==='')? null:v;}catch{return null;}};
        const account=sn.toLowerCase().includes('canara')?'Canara':'Union';
        const sl=sn.toLowerCase();
        let month=null;
        for(const[k,v] of Object.entries(monthMap)){if(sl.includes(k)){month=v;break;}}
        if(!month) return;
        const year=(['Jan','Feb','Mar'].includes(month)&&!sl.includes('2025'))?'2026':'2025';
        const obj={
          sheet:sn, account, month, year,
          starting_balance:cell(7,11),
          start_balance:cell(16,3),
          end_balance:cell(16,4),
          saved_this_month:cell(14,8),
          savings_label:cell(13,8)||'',
          total_expenses_actual:cell(21,2)||0,
          total_income_actual:cell(21,8)||0,
          expense_categories:[],
          income_categories:[]
        };
        for(let r=27;r<Math.min(55,df.length);r++){
          const cn=cell(r,1);
          if(cn&&typeof cn==='string'&&cn.trim()){
            const a=cell(r,4);
            if(a&&parseFloat(a)>0) obj.expense_categories.push({category:cn.trim(),planned:parseFloat(cell(r,3)||0),actual:parseFloat(a),diff:parseFloat(cell(r,5)||0)});
          }
          const in2=cell(r,7);
          if(in2&&typeof in2==='string'&&in2.trim()){
            const a=cell(r,10);
            if(a&&parseFloat(a)>0) obj.income_categories.push({category:in2.trim(),planned:parseFloat(cell(r,9)||0),actual:parseFloat(a),diff:parseFloat(cell(r,11)||0)});
          }
        }
        ['start_balance','end_balance','saved_this_month','starting_balance','total_expenses_actual','total_income_actual'].forEach(k=>{
          if(obj[k]!==null&&obj[k]!==undefined) obj[k]=parseFloat(obj[k]);
        });
        parsed.push(obj);
      });
      if(parsed.length){
        data=parsed;
        document.getElementById('file-label').textContent='Showing data from: '+file.name+' ('+parsed.length+' summary sheets)';
        populateMonthSelect();
        render();
      } else {
        alert('No summary sheets found in this file.');
      }
    }catch(e){alert('Error reading file: '+e.message);}
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

populateMonthSelect();
render();
</script>
